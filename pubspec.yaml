name: tripStory
description: "this tripStory"
publish_to: 'none'
version: 1.0.0+5
environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  kakao_flutter_sdk: ^1.9.3
  sign_in_with_apple: ^6.1.1
  google_sign_in: ^6.2.1
  shared_preferences: ^2.2.3
  stomp_dart_client: ^2.0.0
  flutter_jailbreak_detection: ^1.10.0
  firebase_core: ^3.2.0
  http: ^1.2.1
  get: ^4.6.6
  cloud_firestore: ^5.0.1
  firebase_messaging: ^15.0.3
  flutter_local_notifications: ^17.2.1+1
  cached_network_image: ^3.3.1
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  flutter_native_splash: ^2.4.0
  flutter_svg: ^2.0.10+1
  permission_handler: ^11.3.1
  google_maps_flutter: ^2.6.0
  flutter_quill_extensions: ^11.0.0
  flutter_quill: ^11.2.0
  google_places_flutter: ^2.0.9
  calendar_date_picker2: ^1.1.6
  photo_manager: ^3.2.3
  photo_manager_image_provider: ^2.1.1
  syncfusion_flutter_datepicker: ^26.2.13
  popover: ^0.3.1
  flutter_staggered_grid_view: ^0.7.0
  flutter_image_compress: ^2.3.0
  loading_animation_widget: ^1.2.1
  fluttertoast: ^8.2.8
  url_launcher: ^6.3.1
  geolocator: ^12.0.0
  package_info_plus: ^4.2.0
  version: ^3.0.2
  store_redirect: ^2.0.3
  device_info_plus: ^10.1.2
  flutter_slidable: ^3.1.2
  infinite_scroll_pagination: ^4.1.0
  connectivity_plus: ^6.1.1
  google_maps_cluster_manager_2: ^3.2.0
  freezed_annotation: ^3.0.0
  flutter_lints: ^5.0.0
  logger: ^2.5.0
  retrofit: ^4.4.2
  dartz: ^0.10.1
  equatable: ^2.0.7
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  retrofit_generator: ^9.2.0
  build_runner: ^2.4.15
  freezed: ^3.0.4
  json_serializable: ^6.9.4

flutter_native_splash:

  color: "#ffffff"
  image: assets/icon/splash1.png

  android_12:

    color: "#ffffff"
    background_image: "assets/icon/splash1.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/
    - assets/sns/
    - assets/icon/
    - assets/icon/normal/
    - assets/bottomNavi/
  fonts:
    - family: Pretendard
      fonts:
        - asset: fonts/Pretendard-Black.ttf
          weight: 900
        - asset: fonts/Pretendard-ExtraBold.ttf
          weight: 800
        - asset: fonts/Pretendard-Bold.ttf
          weight: 700
        - asset: fonts/Pretendard-SemiBold.ttf
          weight: 600
        - asset: fonts/Pretendard-Medium.ttf
          weight: 500
        - asset: fonts/Pretendard-Regular.ttf
          weight: 400
        - asset: fonts/Pretendard-Light.ttf
          weight: 300
        - asset: fonts/Pretendard-ExtraLight.ttf
          weight: 200
        - asset: fonts/Pretendard-Thin.ttf
          weight: 100
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
